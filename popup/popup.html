<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
    <title>Accessibility Toolbar</title>
  </head>
  <body>
    <h1>Accessibility Toolbar</h1>
    <p class="hint">
      A toolbar is shown at the top of every page so you can adjust font size,
      line spacing, contrast and more. Settings are remembered per website.
    </p>
    <div class="actions">
      <button id="show">Show toolbar on this page</button>
      <button id="reset">Reset this page</button>
    </div>
    <p id="status" class="status"></p>
    <script src="popup.js"></script>
  </body>
</html>
